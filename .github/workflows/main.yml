name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 */3 * *'  # Runs every 3 days at 9:00 AM UTC
  workflow_dispatch:        # Manual trigger button

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          # The -f flag makes curl fail if the server returns an error
          curl -s -f \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://qeqiwcypmeexihqbvweu.supabase.co/rest/v1/companies?select=id&limit=1"
          
          # Using a standard ISO date format to avoid "Invalid time" logs
          echo "Ping successful at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
